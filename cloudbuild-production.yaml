steps:
  # Step 0: Setup npm authentication for @helicarrier/sdk
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-npm-auth'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        ACCESS_TOKEN=$(gcloud auth print-access-token)
        cat > /workspace/.npmrc << EOF
        @helicarrier:registry=https://asia-south1-npm.pkg.dev/kf-dev-ops-p001/helicarrier-npm-sdk/
        //asia-south1-npm.pkg.dev/kf-dev-ops-p001/helicarrier-npm-sdk/:_authToken=$${ACCESS_TOKEN}
        EOF
        echo "npm auth configured for @helicarrier/sdk"

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    waitFor: ['setup-npm-auth']
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GCS_BUCKET_NAME=${_GCS_BUCKET},HELICARRIER_PLATFORM_URL=${_PLATFORM_URL}'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--concurrency'
      - '80'

substitutions:
  _SERVICE_NAME: axiom-docs-production
  _REGION: asia-south1
  _ARTIFACT_REPO: helicarrier
  _GCS_BUCKET: axiom-docs-production
  _PLATFORM_URL: https://helicarrier.zingworks.com

options:
  logging: CLOUD_LOGGING_ONLY

tags:
  - axiom-docs
  - production
